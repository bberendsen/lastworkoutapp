<div class="container mx-auto max-w-xl w-full min-w-0 px-4 pt-4 pb-8 box-border">
  <div class="flex flex-col items-center mb-5">
    <div class="mb-2" aria-hidden="true">
      <img src="/images/Logo-LastWorkout-png.png" alt="Last Workout" class="h-9 w-auto object-contain rounded-lg border border-gray-300" />
    </div>
    <h1 class="text-xl font-semibold text-black text-center">Join a team</h1>
    <p class="text-sm text-gray-500 mt-1 text-center">Optional — pick a team now or skip and do this later in Settings.</p>
  </div>

  @if (loading()) {
    <p class="text-sm text-gray-500 py-6 text-center">Loading teams…</p>
  } @else if (error()) {
    <p class="text-sm text-gray-600 rounded-md bg-gray-50 border border-gray-200 px-3 py-2">{{ error() }}</p>
    <button type="button" (click)="skip()" class="mt-4 w-full btn-primary h-10 text-sm">Continue without team</button>
  } @else {
    @if (actionError()) {
      <p class="text-sm text-gray-600 rounded-md bg-gray-50 border border-gray-200 px-3 py-2 mb-4">{{ actionError() }}</p>
    }
    <ul class="rounded-lg border border-gray-200 bg-white overflow-hidden shadow-sm divide-y divide-gray-100 mb-4">
      @for (team of teams(); track team.id) {
        <li>
          <button
            type="button"
            (click)="selectTeam(team.id)"
            [class.bg-gray-50]="selectedId() === team.id"
            class="w-full text-left py-3 px-4 flex gap-3 items-center min-w-0 hover:bg-gray-50/80 transition-colors"
          >
            <span
              class="inline-block rounded-full shrink-0 ring-1 ring-black/10"
              [style.width.px]="10"
              [style.height.px]="10"
              [style.background]="presetGradient(team.gradient_preset)"
              aria-hidden="true"
            ></span>
            @if (team.logo_url) {
              <img [src]="team.logo_url" alt="" class="h-10 w-10 rounded-lg object-cover border border-gray-200 shrink-0" />
            } @else {
              <div
                class="h-10 w-10 rounded-lg border border-gray-200 bg-gray-50 flex items-center justify-center text-xs font-semibold text-gray-600 shrink-0"
                aria-hidden="true"
              >
                {{ team.name.charAt(0).toUpperCase() }}
              </div>
            }
            <div class="min-w-0 flex-1">
              <p class="text-sm font-semibold text-black truncate">{{ team.name }}</p>
              <p class="text-xs text-gray-500">{{ team.members_count }} members</p>
            </div>
            @if (selectedId() === team.id) {
              <span class="text-xs font-medium text-gray-800 shrink-0">Selected</span>
            }
          </button>
        </li>
      }
    </ul>

    <div class="flex flex-col gap-2">
      <button type="button" (click)="continueWithSelection()" [disabled]="busy()" class="btn-primary w-full h-10 text-sm">
        {{ busy() ? '…' : selectedId() ? 'Continue' : 'Continue without team' }}
      </button>
      <button type="button" (click)="skip()" [disabled]="busy()" class="w-full h-10 text-sm rounded-lg border border-gray-200 bg-white font-medium text-gray-800 hover:bg-gray-50 disabled:opacity-50">
        Skip for now
      </button>
    </div>
  }
</div>
