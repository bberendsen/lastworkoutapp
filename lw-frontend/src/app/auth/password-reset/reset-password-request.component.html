<div class="container mx-auto max-w-md px-4 py-12">
  <div class="flex flex-col items-center mb-8">
    <div class="mb-2" aria-hidden="true">
      <img src="/images/Logo-LastWorkout-png.png" alt="Last Workout" class="h-9 w-auto object-contain rounded-lg border border-gray-300" />
    </div>
    <h1 class="text-xl font-semibold text-black">Reset password</h1>
    <p class="text-sm text-center text-gray-500 mt-1">Enter the email on your account. We will send a 6-digit code that is valid for 1 minute.</p>
  </div>

  <div class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="space-y-2">
        <label for="email" class="text-sm font-medium text-gray-900">Email</label>
        <input
          type="email"
          formControlName="email"
          id="email"
          placeholder="you@example.com"
          autocomplete="email"
          class="flex h-10 w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-black placeholder:text-gray-400 focus-ring"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="text-xs text-gray-500">Valid email is required</p>
        }
      </div>

      @if (errorMessage) {
        <p class="text-sm text-gray-600 rounded-md bg-gray-50 border border-gray-200 px-3 py-2">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="submitting" class="btn-primary w-full h-10 text-sm">
        {{ submitting ? 'Sending…' : 'Send code' }}
      </button>
    </form>
  </div>

  <p class="mt-6 text-center text-sm text-gray-500">
    <a routerLink="/login" class="font-medium text-black hover:underline">Back to login</a>
  </p>
</div>
