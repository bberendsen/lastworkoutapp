<div class="container mx-auto max-w-md px-4 py-12">
  <div class="flex flex-col items-center mb-8">
    <div class="mb-2" aria-hidden="true">
      <img src="/images/Logo-LastWorkout-png.png" alt="Last Workout" class="h-9 w-auto object-contain rounded-lg border border-gray-300" />
    </div>
    <h1 class="text-xl font-semibold text-black">Enter code</h1>
    <p class="text-sm text-center text-gray-500 mt-1">We sent a 6-digit code to <span class="font-medium text-gray-800">{{ email }}</span>. It expires in 1 minute.</p>
  </div>

  <div class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="space-y-2">
        <label for="code" class="text-sm font-medium text-gray-900">6-digit code</label>
        <input
          type="text"
          inputmode="numeric"
          maxlength="6"
          pattern="[0-9]*"
          formControlName="code"
          id="code"
          placeholder="000000"
          autocomplete="one-time-code"
          class="flex h-10 w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-black tracking-widest text-center placeholder:text-gray-400 focus-ring"
        />
        @if (form.get('code')?.invalid && form.get('code')?.touched) {
          <p class="text-xs text-gray-500">Enter the 6-digit code from your email</p>
        }
      </div>

      @if (errorMessage) {
        <p class="text-sm text-gray-600 rounded-md bg-gray-50 border border-gray-200 px-3 py-2">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="submitting" class="btn-primary w-full h-10 text-sm">
        {{ submitting ? 'Checking…' : 'Continue' }}
      </button>
    </form>

    <div class="mt-4 flex flex-col gap-2 text-center text-sm">
      <button type="button" (click)="resendCode()" [disabled]="resending" class="font-medium text-black hover:underline disabled:opacity-50">
        {{ resending ? 'Sending…' : 'Send a new code' }}
      </button>
      <button type="button" (click)="cancel()" class="text-gray-500 hover:underline">Start over</button>
    </div>
  </div>

  <p class="mt-6 text-center text-sm text-gray-500">
    <a routerLink="/login" class="font-medium text-black hover:underline">Back to login</a>
  </p>
</div>
