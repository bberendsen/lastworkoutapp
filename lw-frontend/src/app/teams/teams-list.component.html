<div class="container mx-auto max-w-2xl px-4 py-8">
  <div class="flex items-center justify-between gap-4 mb-6">
    <div class="flex flex-col gap-1 min-w-0">
      <h1 class="text-xl font-semibold text-black">Teams</h1>
      <span class="text-xs font-normal text-gray-500">Browse teams and open details</span>
    </div>
    <a
      routerLink="/teams/create"
      class="shrink-0 rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm font-medium text-black hover:bg-gray-50 transition-colors focus-ring"
    >
      New team
    </a>
  </div>

  @if (loading()) {
    <p class="text-sm text-gray-500 py-6">Loading…</p>
  } @else if (error()) {
    <p class="text-sm text-gray-600 rounded-md bg-gray-50 border border-gray-200 px-3 py-2">{{ error() }}</p>
    <button type="button" (click)="load()" class="mt-3 text-sm font-medium text-black underline">Try again</button>
  } @else if (teams().length === 0) {
    <div class="rounded-lg border border-gray-200 bg-white p-8 text-center shadow-sm">
      <p class="text-sm text-gray-600">No teams yet. Create one to get started.</p>
      <a routerLink="/teams/create" class="mt-4 inline-block btn-primary px-4 py-2 text-sm">Create team</a>
    </div>
  } @else {
    <ul class="rounded-lg border border-gray-200 bg-white overflow-hidden shadow-sm divide-y divide-gray-100">
      @for (team of teams(); track team.id) {
        <li>
          <button
            type="button"
            (click)="goDetail(team.id)"
            class="w-full text-left py-4 px-4 hover:bg-gray-50 transition-colors flex gap-3 items-center min-w-0"
          >
            <span
              class="inline-block rounded-full shrink-0 mt-0.5 ring-1 ring-black/10"
              [style.width.px]="10"
              [style.height.px]="10"
              [style.background]="presetGradient(team.gradient_preset)"
              aria-hidden="true"
            ></span>
            @if (team.logo_url) {
              <img [src]="team.logo_url" alt="" class="h-12 w-12 rounded-lg object-cover border border-gray-200 shrink-0" />
            } @else {
              <div
                class="h-12 w-12 rounded-lg border border-gray-200 bg-gray-50 flex items-center justify-center text-sm font-semibold text-gray-600 shrink-0"
                aria-hidden="true"
              >
                {{ team.name.charAt(0).toUpperCase() }}
              </div>
            }
            <div class="min-w-0 flex-1">
              <p class="text-sm font-semibold text-black truncate">{{ team.name }}</p>
              <p class="text-xs text-gray-500 mt-0.5">
                {{ team.members_count }} {{ team.members_count === 1 ? 'member' : 'members' }}
                @if (team.is_member) {
                  <span class="text-gray-800 font-medium"> · You’re in</span>
                }
              </p>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 text-gray-400 shrink-0">
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>
        </li>
      }
    </ul>
  }
</div>
