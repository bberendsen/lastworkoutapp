<div class="container mx-auto max-w-2xl px-4 py-8">
  <div class="flex items-center gap-4 mb-6">
    <a routerLink="/teams" class="text-gray-500 hover:text-black transition-colors" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </a>
    <div class="flex flex-col gap-1">
      <h1 class="text-xl font-semibold text-black">New team</h1>
      <span class="text-xs text-gray-500">Name, optional logo, tap a color circle</span>
    </div>
  </div>

  <div class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm space-y-5">
    <form (ngSubmit)="submit()" [formGroup]="form" class="space-y-5">
      <div class="space-y-2">
        <label for="name" class="text-sm font-medium text-gray-900">Team name</label>
        <input
          id="name"
          formControlName="name"
          type="text"
          class="flex h-10 w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-black placeholder:text-gray-400 focus-ring"
          placeholder="e.g. Morning runners"
        />
      </div>
      <div class="space-y-2">
        <span class="text-sm font-medium text-gray-900">Team logo (optional)</span>
        <p class="text-xs text-gray-500">PNG, JPG, GIF or WebP · max ~2MB</p>
        <input
          type="file"
          accept="image/jpeg,image/png,image/gif,image/webp"
          (change)="onLogoSelected($event)"
          class="block w-full text-sm text-gray-600 file:mr-3 file:rounded-lg file:border file:border-gray-200 file:bg-white file:px-3 file:py-2 file:text-sm file:font-medium file:text-black"
        />
        @if (logoPreview()) {
          <div class="flex items-start gap-3 mt-2">
            <img [src]="logoPreview()!" alt="Logo preview" class="h-16 w-16 rounded-lg object-cover border border-gray-200" />
            <button type="button" (click)="clearLogo()" class="text-sm font-medium text-gray-700 underline">Remove image</button>
          </div>
        }
      </div>
      <div class="space-y-3">
        <span class="text-sm font-medium text-gray-900">Team color</span>
        <p class="text-xs text-gray-500">4px circles — large tap area. Hover for name.</p>
        <div class="flex flex-wrap gap-2" role="listbox" aria-label="Team color">
          @for (p of presets; track p.id) {
            <button
              type="button"
              (click)="selectPreset(p.id)"
              [attr.title]="p.label"
              [attr.aria-label]="'Color: ' + p.label"
              [attr.aria-selected]="form.value.gradient_preset === p.id"
              class="min-w-[44px] min-h-[44px] inline-flex items-center justify-center rounded-full border border-gray-200 bg-white transition-shadow focus-ring"
              [class.ring-2]="form.value.gradient_preset === p.id"
              [class.ring-gray-900]="form.value.gradient_preset === p.id"
              [class.ring-offset-2]="form.value.gradient_preset === p.id"
            >
              <span
                class="inline-block rounded-full shrink-0 ring-1 ring-black/15"
                [style.width.px]="14"
                [style.height.px]="14"
                [style.background]="presetGradient(p.id)"
                aria-hidden="true"
              ></span>
            </button>
          }
        </div>
      </div>
      @if (error()) {
        <p class="text-sm text-gray-600 rounded-md bg-gray-50 border border-gray-200 px-3 py-2">{{ error() }}</p>
      }
      <button type="submit" [disabled]="submitting() || form.invalid" class="btn-primary w-full h-10 text-sm">
        {{ submitting() ? 'Creating…' : 'Create team' }}
      </button>
    </form>
  </div>
</div>
